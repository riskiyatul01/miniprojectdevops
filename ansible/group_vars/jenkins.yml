---
# ============================================
# Variabel Khusus Jenkins Node
# ============================================
#
# ⚠️  CATATAN KEAMANAN (Ansible Vault):
# ──────────────────────────────────────
# Pada environment PRODUCTION, variabel sensitif seperti
# password dan credential HARUS dienkripsi menggunakan
# Ansible Vault agar tidak tersimpan plaintext di repository.
#
# Langkah penggunaan Vault:
#   1. Buat file vault: ansible-vault create group_vars/vault.yml
#   2. Pindahkan variabel sensitif ke vault.yml:
#        vault_jenkins_admin_password: "password_rahasia"
#        vault_dockerhub_password: "token_rahasia"
#   3. Referensikan di file ini:
#        jenkins_admin_password: "{{ vault_jenkins_admin_password }}"
#        dockerhub_password: "{{ vault_dockerhub_password }}"
#   4. Jalankan playbook: ansible-playbook --ask-vault-pass playbook-setup-all.yml
#
# Untuk environment LAB/akademis ini, credentials disimpan
# plaintext untuk kemudahan demonstrasi.
# ============================================

# Jenkins Container
jenkins_container_name: "jenkins"
jenkins_image: "jenkins/jenkins:lts"
jenkins_http_port: 8080
jenkins_agent_port: 50000
jenkins_home: "/opt/jenkins_home"
jenkins_casc_dir: "/opt/jenkins_casc"

# Jenkins Admin
jenkins_admin_user: "kelompok3"
jenkins_admin_password: "{{ vault_jenkins_admin_password }}"

# Jenkins URL (berdasarkan IP publik)
jenkins_url: "http://{{ ansible_host }}:{{ jenkins_http_port }}"

# Number of Executors
jenkins_num_executors: 2

# Docker Hub Credentials untuk JCasC
dockerhub_creds_id: "dockerhub-creds"
dockerhub_password: "{{ vault_dockerhub_password }}"           # ⚠️ Production: pindahkan ke Vault

# Pipeline Job
jenkins_job_name: "miniproject-devops"
jenkins_job_branch: "*/main"

# Ansible di Jenkins (untuk deploy via Ansible)
jenkins_ansible_inventory: "/var/jenkins_home/ansible/inventory/hosts.yml"
jenkins_ansible_config: "/var/jenkins_home/ansible/ansible.cfg"
