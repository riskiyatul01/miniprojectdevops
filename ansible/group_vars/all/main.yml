---
# ============================================
# Variabel Global — Berlaku untuk Semua Node
# ============================================

# Docker
docker_edition: "ce"
docker_compose_version: "v2"

# Aplikasi
app_name: "simple-app"
app_version: "1.0.0"
app_port: 3000

# Docker Hub
dockerhub_username: "{{ vault_dockerhub_username }}"      
dockerhub_password: "{{ vault_dockerhub_pat }}"             
dockerhub_image: "{{ dockerhub_username }}/{{ app_name }}"

# GitHub Repository
github_repo_url: "https://github.com/riskiyatul01/miniprojectdevops"

# Timezone
timezone: "Asia/Jakarta"
