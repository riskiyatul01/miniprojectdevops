# ============================================
# 1. DIRECTORY SETUP
# ============================================
- name: Create jenkins_home
  ansible.builtin.file:
    path: "{{ jenkins_home }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"

- name: Create JCasC directory
  ansible.builtin.file:
    path: "{{ jenkins_casc_dir }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"

# ============================================
# 2. PREP DOCKER BUILD CONTEXT (REMOTE SAFE)
# ============================================
- name: Create build directory on remote
  ansible.builtin.file:
    path: /tmp/jenkins-build
    state: directory
    mode: "0755"

- name: Copy Dockerfile to remote build context
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/roles/jenkins/files/Dockerfile"
    dest: /tmp/jenkins-build/Dockerfile

- name: Copy plugins.txt to remote build context
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/roles/jenkins/files/plugins.txt"
    dest: /tmp/jenkins-build/plugins.txt

# ============================================
# 3. COPY JCASc
# ============================================
- name: Delete existing JCasC configuration
  ansible.builtin.file:
    path: "{{ jenkins_casc_dir }}/jenkins-casc.yml"
    state: absent

- name: Copy JCasC configuration
  ansible.builtin.template:
    src: jenkins-casc.yml.j2
    dest: "{{ jenkins_casc_dir }}/jenkins-casc.yml"
    owner: "1000"
    group: "1000"
    mode: "0644"

# ============================================
# 4. BUILD DOCKER IMAGE (FIXED)
# ============================================
- name: Build custom Jenkins image
  ansible.builtin.command: >
    docker build -t custom-jenkins:latest /tmp/jenkins-build
  register: build_result
  changed_when: build_result.rc == 0

# ============================================
# 5. STOP OLD CONTAINER
# ============================================
- name: Stop old Jenkins container
  ansible.builtin.command: docker stop {{ jenkins_container_name }}
  ignore_errors: yes
  changed_when: false

- name: Remove old Jenkins container
  ansible.builtin.command: docker rm {{ jenkins_container_name }}
  ignore_errors: yes
  changed_when: false

# ============================================
# 6. RUN NEW CONTAINER
# ============================================
- name: Run Jenkins container
  ansible.builtin.command: >
    docker run -d
    --name {{ jenkins_container_name }}
    --restart unless-stopped
    -p {{ jenkins_http_port }}:8080
    -p {{ jenkins_agent_port }}:50000
    -v {{ jenkins_home }}:/var/jenkins_home
    -v /var/run/docker.sock:/var/run/docker.sock
    -v {{ jenkins_casc_dir }}:/var/jenkins_casc:ro
    -v /home/ubuntu/.ssh/id_rsa:/var/jenkins_home/.ssh/id_rsa:ro
    -e JAVA_OPTS="-Djenkins.install.runSetupWizard=false"
    -e CASC_JENKINS_CONFIG=/var/jenkins_casc/jenkins-casc.yml
    custom-jenkins:latest

# ============================================
# 7. WAIT JENKINS READY (ROBUST)
# ============================================
- name: Wait Jenkins ready
  ansible.builtin.uri:
    url: "http://localhost:{{ jenkins_http_port }}/whoAmI/api/json"
    status_code: 200
    timeout: 10
  register: jenkins_ready
  until: jenkins_ready.status == 200
  retries: 60
  delay: 5

# ============================================
# 8. POST CONFIG (SAFE ONLY)
# ============================================
- name: Fix git safe directory
  ansible.builtin.command: >
    docker exec -u root {{ jenkins_container_name }}
    git config --global --add safe.directory '*'
  changed_when: false

- name: Set git config
  ansible.builtin.command: >
    docker exec -u root {{ jenkins_container_name }}
    bash -c "git config --global user.email 'fiorenzanalle05@gmail.com' && git config --global user.name 'fioreenza'"
  changed_when: false

# optional safer docker access
- name: Add jenkins user to docker group
  ansible.builtin.command: >
    docker exec -u root {{ jenkins_container_name }}
    usermod -aG docker jenkins
  changed_when: false

# ============================================
# 9. FINAL OUTPUT
# ============================================
- name: Show Jenkins URL
  ansible.builtin.debug:
    msg: "✅ Jenkins ready at {{ jenkins_url }}"