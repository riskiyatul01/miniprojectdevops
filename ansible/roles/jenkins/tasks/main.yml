# ============================================
# Role: jenkins — Setup Jenkins Container + JCasC
# OPTIMIZED VERSION
# ============================================

# --- Persiapan Direktori ---
- name: Buat direktori jenkins_home
  ansible.builtin.file:
    path: "{{ jenkins_home }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"

- name: Buat direktori JCasC
  ansible.builtin.file:
    path: "{{ jenkins_casc_dir }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"

- name: Buat direktori Ansible config di jenkins_home
  ansible.builtin.file:
    path: "{{ jenkins_home }}/ansible"
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"
    recurse: yes

# --- Copy Konfigurasi ---
- name: Template JCasC configuration
  ansible.builtin.template:
    src: jenkins-casc.yml.j2
    dest: "{{ jenkins_casc_dir }}/jenkins-casc.yml"
    owner: "1000"
    group: "1000"
    mode: "0644"

- name: Copy plugins.txt ke server
  ansible.builtin.copy:
    src: plugins.txt
    dest: "{{ jenkins_home }}/plugins.txt"
    owner: "1000"
    group: "1000"
    mode: "0644"
  register: plugins_file

# --- Sync Ansible Files (Optimized with synchronize or copy) ---
- name: Copy Ansible deployment files to jenkins_home
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ jenkins_home }}/ansible/{{ item.dest }}"
    owner: "1000"
    group: "1000"
    mode: "0644"
  with_items:
    - { src: "{{ playbook_dir }}/ansible.cfg", dest: "ansible.cfg" }
    - { src: "{{ playbook_dir }}/inventory/", dest: "inventory/" }
    - { src: "{{ playbook_dir }}/group_vars/", dest: "group_vars/" }
    - { src: "{{ playbook_dir }}/roles/", dest: "roles/" }
    - { src: "{{ playbook_dir }}/playbook-deploy.yml", dest: "playbook-deploy.yml" }

# --- Jalankan Jenkins Container ---
- name: Cek apakah Jenkins sudah berjalan
  ansible.builtin.command: docker ps -q -f name={{ jenkins_container_name }}
  register: jenkins_running
  changed_when: false

- name: Jalankan Jenkins container jika belum ada
  ansible.builtin.command: >
    docker run -d
    --name {{ jenkins_container_name }}
    --restart unless-stopped
    -p {{ jenkins_http_port }}:8080
    -p {{ jenkins_agent_port }}:50000
    -v {{ jenkins_home }}:/var/jenkins_home
    -v /var/run/docker.sock:/var/run/docker.sock
    -v {{ jenkins_casc_dir }}:/var/jenkins_casc:ro
    -e CASC_JENKINS_CONFIG=/var/jenkins_casc/jenkins-casc.yml
    -e TARGET_SSH_KEY="$(cat ~/.ssh/id_rsa)"
    -e JAVA_OPTS="-Djenkins.install.runSetupWizard=false"
    {{ jenkins_image }}
  when: jenkins_running.stdout == ""

# --- Post-Installations (Hanya jika container baru/update) ---
- name: Install Tools & Plugins di Jenkins (Hanya jika plugins.txt berubah)
  block:
    - name: Update apt & Install Docker CLI + Ansible
      ansible.builtin.command: >
        docker exec -u root {{ jenkins_container_name }}
        bash -c "apt-get update && apt-get install -y docker.io ansible sshpass"

    - name: Install Jenkins plugins (INI TAHAP LAMA - Dijalankan hanya jika perlu)
      ansible.builtin.command: >
        docker exec {{ jenkins_container_name }}
        jenkins-plugin-cli --plugin-file /var/jenkins_home/plugins.txt
      register: plugin_install
      ignore_errors: yes

    - name: Restart Jenkins to apply plugins
      ansible.builtin.command: docker restart {{ jenkins_container_name }}

    - name: Tunggu Jenkins siap
      ansible.builtin.uri:
        url: "http://localhost:{{ jenkins_http_port }}/login"
        status_code: 200
        timeout: 10
      until: jenkins_ready.status == 200
      retries: 24
      delay: 5
      register: jenkins_ready
  when: plugins_file.changed or jenkins_running.stdout == ""

# --- Permission & Security Fixes (Selalu jalankan agar tetap sinkron) ---
- name: Fix Docker Socket Permissions
  ansible.builtin.command: docker exec -u root {{ jenkins_container_name }} chmod 666 /var/run/docker.sock
  changed_when: false

- name: Configure Git Identity in Jenkins
  ansible.builtin.command: >
    docker exec -u root {{ jenkins_container_name }}
    bash -c "git config --global user.email '{{ git_email }}' && git config --global user.name '{{ git_name }}' && git config --global --add safe.directory '*'"
  changed_when: false

- name: Tampilkan status Jenkins
  ansible.builtin.debug:
    msg: "✅ Jenkins OPTIMIZED siap diakses di {{ jenkins_url }}"
