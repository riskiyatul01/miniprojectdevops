---
# ============================================
# Role: deploy — Deployment Aplikasi ke Target Node
# Menggunakan Docker Compose untuk orchestration
# ============================================

# --- Persiapan ---
- name: Buat direktori deployment
  ansible.builtin.file:
    path: "{{ deploy_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Template docker-compose.yml ke target node
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ deploy_dir }}/docker-compose.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

# --- Simpan versi sebelumnya untuk rollback ---
- name: Cek container yang sedang berjalan (untuk rollback)
  ansible.builtin.shell: |
    docker inspect --format='{% raw %}{{ .Config.Image }}{% endraw %}' {{ app_name }} 2>/dev/null || echo "none"
  register: current_running_image
  changed_when: false
  ignore_errors: yes

- name: Simpan image saat ini sebagai rollback target
  ansible.builtin.copy:
    content: "{{ current_running_image.stdout }}"
    dest: "{{ deploy_dir }}/.previous_image"
    mode: "0644"
  when: current_running_image.stdout != "none"

# --- Pull & Deploy ---
- name: Login ke Docker Hub
  ansible.builtin.command: >
    docker login -u {{ dockerhub_username }} -p {{ dockerhub_password }}
  no_log: true
  changed_when: false

# Proses deploy & test dengan block-rescue untuk rollback otomatis jika gagal
- name: Proses Deployment dan Verifikasi
  block:
    - name: Pull image terbaru
      ansible.builtin.command: >
        docker pull {{ dockerhub_image }}:{{ image_tag | default('latest') }}

    - name: Deploy aplikasi menggunakan Docker Compose
      ansible.builtin.shell: |
        cd {{ deploy_dir }}
        export IMAGE_TAG={{ image_tag | default('latest') }}
        docker compose down --remove-orphans || true
        docker compose up -d
      environment:
        IMAGE_TAG: "{{ image_tag | default('latest') }}"

    - name: Smoke Test (Tunggu aplikasi siap)
      ansible.builtin.uri:
        url: "{{ healthcheck_url }}"
        status_code: 200
        timeout: 5
      register: healthcheck
      until: healthcheck.status == 200
      retries: "{{ healthcheck_retries }}"
      delay: "{{ healthcheck_delay }}"

  rescue:
    # Hanya jalan kalau deploy atau smoke test di atas GAGAL
    - name: ⚠️ Smoke test gagal! Memulai rollback ke versi sebelumnya...
      ansible.builtin.debug:
        msg: "Deployment gagal. Mengembalikan ke image yang tersimpan di .previous_image"

    - name: Baca image versi sebelumnya
      ansible.builtin.slurp:
        src: "{{ deploy_dir }}/.previous_image"
      register: previous_image_file
      ignore_errors: yes

    - name: Rollback - Deploy ulang versi sebelumnya
      ansible.builtin.shell: |
        cd {{ deploy_dir }}
        docker compose down --remove-orphans || true
        # Mengambil tag dari file backup
        export ROLLBACK_IMAGE={{ previous_image_file.content | b64decode | trim }}
        docker pull $ROLLBACK_IMAGE
        docker compose up -d
      when: previous_image_file.content is defined

    - name: Gagalkan playbook setelah rollback
      ansible.builtin.fail:
        msg: "Deployment gagal dan rollback telah dilakukan."

# Task ini tetap di luar agar selalu jalan (opsional)
- name: Tampilkan status akhir
  ansible.builtin.debug:
    msg: "✅ Deployment BERHASIL di http://{{ ansible_host }}:{{ app_host_port }}"
  when: healthcheck.status is defined and healthcheck.status == 200