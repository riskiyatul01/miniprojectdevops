---
# ============================================
# Role: docker — Instalasi Docker Engine
# ============================================

- name: Hapus versi Docker lama (jika ada)
  ansible.builtin.apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent
  ignore_errors: yes

- name: Buat direktori keyrings
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Tambah Docker GPG key
  ansible.builtin.shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Tambah Docker APT repository
  ansible.builtin.shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  args:
    creates: /etc/apt/sources.list.d/docker.list

- name: Update apt cache setelah tambah repo Docker
  ansible.builtin.apt:
    update_cache: yes

- name: Install Docker Engine dan komponen
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  notify: Restart Docker

- name: Pastikan Docker service berjalan dan enabled
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: yes

- name: Tambah user '{{ ansible_user }}' ke grup docker
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes

- name: Verifikasi instalasi Docker
  ansible.builtin.command: docker --version
  register: docker_version_output
  changed_when: false

- name: Tampilkan versi Docker
  ansible.builtin.debug:
    msg: "Docker terinstall: {{ docker_version_output.stdout }}"

- name: Verifikasi Docker Compose
  ansible.builtin.command: docker compose version
  register: compose_version_output
  changed_when: false

- name: Tampilkan versi Docker Compose
  ansible.builtin.debug:
    msg: "Docker Compose terinstall: {{ compose_version_output.stdout }}"
